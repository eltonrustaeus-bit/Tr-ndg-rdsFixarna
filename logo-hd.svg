<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="800" height="800"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; }
    </style>

    <path id="logoTextPath" d="M 100,100 m -78,0 a 78,78 0 1,1 156,0 a 78,78 0 1,1 -156,0"/>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#7A4F2E" flood-opacity="0.25"/>
    </filter>

    <filter id="petalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FAF6EE"/>
      <stop offset="100%" stop-color="#EDE3CE"/>
    </radialGradient>

    <radialGradient id="bladeFill" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#8B6B47"/>
    </radialGradient>

    <radialGradient id="flowerCenter" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8889E"/>
      <stop offset="100%" stop-color="#C8607A"/>
    </radialGradient>
  </defs>

  <!-- Outer ring shadow -->
  <circle cx="100" cy="101" r="96" fill="rgba(90,60,30,0.10)"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="96"  fill="none" stroke="#C8A87A" stroke-width="2"   opacity="0.45"/>
  <circle cx="100" cy="100" r="89"  fill="none" stroke="#C8A87A" stroke-width="0.7" opacity="0.25"/>

  <!-- ── CURVED BRAND NAME ── -->
  <text font-size="13.5" font-weight="700" letter-spacing="2.2" fill="#3D2B1F">
    <textPath href="#logoTextPath" startOffset="8%">TrädgårdsFixarna</textPath>
  </text>

  <!-- ── SOIL MOUND ── -->
  <ellipse cx="108" cy="140" rx="27" ry="7.5" fill="#5C3A1E" opacity="0.70"/>
  <ellipse cx="108" cy="139" rx="22" ry="5"   fill="#7A5030" opacity="0.35"/>

  <!-- ── TROWEL ── -->
  <!-- Handle -->
  <rect x="104" y="78" width="8" height="48" rx="4"
        fill="#9B6B3A" transform="rotate(12, 108, 110)" filter="url(#softShadow)"/>
  <!-- Grip rings -->
  <rect x="104" y="83"   width="8" height="2.5" rx="1.2" fill="#7A4F2E" transform="rotate(12, 108, 110)"/>
  <rect x="104" y="88.5" width="8" height="2.5" rx="1.2" fill="#7A4F2E" transform="rotate(12, 108, 110)"/>
  <!-- Blade outer -->
  <path d="M 97,118 Q 90,138 108,145 Q 126,138 119,118 Z"
        fill="url(#bladeFill)" transform="rotate(12, 108, 130)"/>
  <!-- Blade highlight -->
  <path d="M 99,118 Q 93,135 108,141 Q 123,135 117,118 Z"
        fill="#C09A65" opacity="0.55" transform="rotate(12, 108, 130)"/>
  <!-- Blade shine -->
  <path d="M 103,122 Q 100,134 108,138"
        stroke="#D4B88A" stroke-width="1.2" fill="none" opacity="0.6"
        transform="rotate(12, 108, 130)" stroke-linecap="round"/>

  <!-- ── FLOWER STEM ── -->
  <path d="M 76,138 Q 74,112 78,88"
        stroke="#4D7A3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Stem highlight -->
  <path d="M 77,136 Q 75.5,112 79,90"
        stroke="#6AAA46" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Left leaf -->
  <ellipse cx="70" cy="115" rx="14" ry="5.5" fill="#4A7A2E" transform="rotate(-45, 70, 115)"/>
  <ellipse cx="70" cy="115" rx="10" ry="3"   fill="#6AAA46" opacity="0.5" transform="rotate(-45, 70, 115)"/>
  <!-- Right leaf -->
  <ellipse cx="84" cy="108" rx="13" ry="5"   fill="#5A8A3A" transform="rotate(20, 84, 108)"/>
  <ellipse cx="84" cy="108" rx="9"  ry="3"   fill="#7ABB55" opacity="0.5" transform="rotate(20, 84, 108)"/>

  <!-- ── FLOWER ── -->
  <g transform="translate(78, 80)">
    <!-- Petals -->
    <ellipse cx="0"   cy="-14" rx="7.5" ry="11" fill="#F2B8C8" opacity="0.92"/>
    <ellipse cx="13"  cy="-5"  rx="7.5" ry="11" fill="#F2B8C8" opacity="0.92" transform="rotate(72)"/>
    <ellipse cx="8"   cy="11"  rx="7.5" ry="11" fill="#F2B8C8" opacity="0.92" transform="rotate(144)"/>
    <ellipse cx="-8"  cy="11"  rx="7.5" ry="11" fill="#F2B8C8" opacity="0.92" transform="rotate(216)"/>
    <ellipse cx="-13" cy="-5"  rx="7.5" ry="11" fill="#F2B8C8" opacity="0.92" transform="rotate(288)"/>
    <!-- Petal highlights -->
    <ellipse cx="0"   cy="-14" rx="4"   ry="7"  fill="#FDD4E0" opacity="0.6"/>
    <ellipse cx="13"  cy="-5"  rx="4"   ry="7"  fill="#FDD4E0" opacity="0.6" transform="rotate(72)"/>
    <ellipse cx="8"   cy="11"  rx="4"   ry="7"  fill="#FDD4E0" opacity="0.6" transform="rotate(144)"/>
    <ellipse cx="-8"  cy="11"  rx="4"   ry="7"  fill="#FDD4E0" opacity="0.6" transform="rotate(216)"/>
    <ellipse cx="-13" cy="-5"  rx="4"   ry="7"  fill="#FDD4E0" opacity="0.6" transform="rotate(288)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="9.5" fill="url(#flowerCenter)"/>
    <circle cx="0" cy="0" r="5.5" fill="#C8607A"/>
    <circle cx="0" cy="0" r="3"   fill="#B04868" opacity="0.6"/>
    <!-- Center dots -->
    <circle cx="0"    cy="-2.2" r="1.3" fill="#FAD0DC" opacity="0.9"/>
    <circle cx="2.1"  cy="1"    r="1.3" fill="#FAD0DC" opacity="0.9"/>
    <circle cx="-2.1" cy="1"    r="1.3" fill="#FAD0DC" opacity="0.9"/>
  </g>

  <!-- ── TAGLINE ── -->
  <text x="100" y="163" text-anchor="middle" fill="#6B5744"
        font-size="7.2" font-style="italic" letter-spacing="0.4"
        font-family="'Playfair Display', Georgia, serif">Vi underlättar din semester</text>

</svg>
